server:
  port: 8081

spring:
  application:
    name: healthcare-management

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/Healthcare

  datasource:
    url: jdbc:postgresql:/<passowrd>/ep-cool-cloud-auctmd8l-pooler.c-10.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    username: username
    password: youpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE